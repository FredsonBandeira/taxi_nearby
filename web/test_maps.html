<!DOCTYPE html>
<html>
<head>
  <title>Teste Google Maps</title>
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 16.7421003, lng: -22.9349121 },
        zoom: 15,
      });
    }
  </script>
  <script 
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDnUQEQJyFAWW3QZcOw_Evi5AJNMNwgR50&callback=initMap" 
    async defer>
  </script>
</body>
</html>
